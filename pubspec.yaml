name: teleonevoiceanalyst
description: Teleone Voice Quality Analyzer AI- Powered by Teleone Consumer Product Pvt Ltd
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"  # ← This is where sdk belongs, NOT under flutter

dependencies:
  flutter:
    sdk: flutter
  http_parser: ^4.0.2
  # UI Components
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9
  lottie: ^2.7.0

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.3

  # File Handling
  file_picker: ^6.1.1
  cross_file: ^0.3.3+8

  # Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^12.0.0

  # Utilities
  intl: ^0.18.1
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.2

  # Platform Detection
  universal_platform: ^1.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

#  assets:
#    - assets/images/
#    - assets/animations/
#    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
